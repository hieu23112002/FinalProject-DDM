services:
  frontend:
    build: ./frontend
    container_name: churn_frontend
    # Removed direct port mapping to resolve conflict with Grafana. 
    # Frontend is accessible via Nginx on port 80.
    # ports:
    #   - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      churn-api:
        condition: service_healthy
    networks:
      - ml_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - churn-api
    networks:
      - ml_network
    restart: unless-stopped

  churn-api:
    build: .
    container_name: churn_api_service
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ml_network

  mlflow:
    build: .
    container_name: mlflow_service
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command:
      - "python"
      - "-m"
      - "mlflow"
      - "server"
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--allowed-hosts=*"
      - "--backend-store-uri=file:///mlflow/mlruns"
      - "--default-artifact-root=/mlflow/mlruns"
    restart: unless-stopped
    networks:
      - ml_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_service
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      churn-api:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped
    networks:
      - ml_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_service
    ports:
      - "3101:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      mlflow:
        condition: service_started
    restart: unless-stopped
    networks:
      - ml_network

  db:
    image: postgres:15-alpine
    container_name: churn_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: churn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: churn_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - ml_network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki_service
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command:
      - -config.file=/etc/loki/local-config.yaml
      - -validation.allow-structured-metadata=false
    networks:
      - ml_network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail_service
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ml_network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: churn_redis
    ports:
      - "6379:6379"
    networks:
      - ml_network
    restart: unless-stopped

  worker:
    build: .
    container_name: churn_worker
    command: celery -A src.worker worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/churn_db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=.
    volumes:
      - .:/app
    networks:
      - ml_network
    restart: unless-stopped

networks:
  ml_network:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
