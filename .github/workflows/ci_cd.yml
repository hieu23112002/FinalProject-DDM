name: Python ML CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
      runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      run: |
        # Chạy test API
        # Lưu ý: Cần tạo mock model nếu muốn chạy hoàn chỉnh trên GitHub CI
        python -m pytest tests/test_api_pytest.py