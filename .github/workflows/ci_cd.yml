name: ML System GitHub-Hosted CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # GIAI ĐOẠN 1: KIỂM THỬ (TEST)
  test:
    name: Kiểm thử hệ thống
    runs-on: ubuntu-latest # Chuyển từ self-hosted sang ubuntu
    
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Tự động cache thư viện để lần sau chạy nhanh hơn

      - name: Cài đặt thư viện và Khởi tạo Mock Data
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx scikit-learn joblib shap
          
          # Tạo thư mục và mock data cho ML
          mkdir -p models
          python3 -c "
          import joblib, sklearn.ensemble, shap, sklearn.preprocessing;
          model = sklearn.ensemble.RandomForestClassifier().fit([[0]*21], [0]);
          joblib.dump(model, 'models/best_model.pkl');
          explainer = shap.TreeExplainer(model);
          joblib.dump(explainer, 'models/shap_explainer.pkl');
          joblib.dump(['feature_'+str(i) for i in range(21)], 'models/feature_names.pkl');
          joblib.dump({'gender': sklearn.preprocessing.LabelEncoder().fit(['a', 'b'])}, 'models/label_encoders.pkl');
          "

      - name: Chạy Pytest
        run: python3 -m pytest tests/test_api_pytest.py -v

  # GIAI ĐOẠN 2: BUILD DOCKER (Không Deploy trực tiếp xuống localhost)
  build:
    name: Đóng gói Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t churn-prediction-app:${{ github.sha }} .

      # LƯU Ý: Ubuntu-latest của GitHub không thể tự đẩy vào localhost của bạn.
      # Bạn thường sẽ đẩy (push) lên Docker Hub hoặc GitHub Container Registry (GHCR) tại đây.