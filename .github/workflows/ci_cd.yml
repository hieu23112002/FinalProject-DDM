name: ML System Local Self-Hosted CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Kiểm thử hệ thống
    runs-on: self-hosted
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt thư viện và Mock Data
        continue-on-error: true
        shell: powershell # Ép chạy bằng powershell
        run: |
          pip install pytest httpx scikit-learn joblib shap --user
          if (!(Test-Path "models")) { New-Item -ItemType Directory -Path "models" }
          python -c "import joblib, sklearn.ensemble, shap, sklearn.preprocessing; model = sklearn.ensemble.RandomForestClassifier().fit([[0]*21], [0]); joblib.dump(model, 'models/best_model.pkl'); explainer = shap.TreeExplainer(model); joblib.dump(explainer, 'models/shap_explainer.pkl'); joblib.dump(['feature_'+str(i) for i in range(21)], 'models/feature_names.pkl'); joblib.dump({'gender': sklearn.preprocessing.LabelEncoder().fit(['a', 'b'])}, 'models/label_encoders.pkl');"

      - name: Chạy Pytest
        continue-on-error: true
        shell: powershell
        run: python -m pytest tests/test_api_pytest.py -v

  deploy:
    name: Đóng gói và Triển khai Local
    runs-on: self-hosted
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Xây dựng Docker Image
        shell: powershell
        run: docker build -t churn-prediction-app:latest .

      - name: Restart Container
        shell: powershell
        run: |
          # PowerShell không dùng || true, ta dùng try/catch hoặc ErrorAction
          $containerExists = docker ps -a -q -f name=churn-container
          if ($containerExists) {
              docker stop churn-container
              docker rm churn-container
          }
          
          # Viết liền một dòng hoặc dùng dấu ` của PowerShell để xuống dòng
          docker run -d --name churn-container -p 8000:8000 --restart unless-stopped churn-prediction-app:latest

      - name: Kiểm tra trạng thái
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          docker ps | Select-String "churn-container"
          Write-Host "Ứng dụng đã sẵn sàng tại http://localhost:8000"