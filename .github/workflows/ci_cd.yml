name: ML System Local Self-Hosted CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure preprocessor artifact exists
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import joblib

          root = Path.cwd()
          sys.path.insert(0, str(root / 'src'))
          from preprocessing import ChurnPreprocessor

          models_dir = root / 'models'
          models_dir.mkdir(exist_ok=True)
          preprocessor_path = models_dir / 'preprocessor.pkl'
          if not preprocessor_path.exists():
              feature_names = joblib.load(models_dir / 'feature_names.pkl')
              legacy_path = root / 'data' / 'processed' / 'label_encoders.pkl'
              preprocessor = ChurnPreprocessor.from_legacy_artifacts(feature_names, legacy_path)
              preprocessor.save(preprocessor_path)
          PY

      - name: Run pytest
        run: python -m pytest tests/test_api_pytest.py -v

  deploy:
    name: Deploy Local Stack
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Verify Docker daemon
        shell: powershell
        run: |
          docker version
          docker info

      - name: Ensure preprocessor artifact exists
        shell: powershell
        run: |
          python -c "from pathlib import Path; import sys, joblib; root = Path.cwd(); sys.path.insert(0, str(root / 'src')); from preprocessing import ChurnPreprocessor; models_dir = root / 'models'; models_dir.mkdir(exist_ok=True); preprocessor_path = models_dir / 'preprocessor.pkl'; legacy_path = root / 'data' / 'processed' / 'label_encoders.pkl'; feature_names = joblib.load(models_dir / 'feature_names.pkl'); preprocessor = ChurnPreprocessor.from_legacy_artifacts(feature_names, legacy_path) if not preprocessor_path.exists() else None; preprocessor.save(preprocessor_path) if preprocessor else None"

      - name: Validate docker compose configuration
        shell: powershell
        run: docker compose config

      - name: Deploy full stack with Docker Compose
        shell: powershell
        run: docker compose up -d --build --remove-orphans

      - name: Check deployment status
        shell: powershell
        run: |
          Start-Sleep -Seconds 20
          docker compose ps
          $api_status = docker ps --filter "name=churn_api_service" --filter "status=running" -q
          if (-not $api_status) {
              Write-Host "DEPLOY FAILED: churn_api_service is not running"
              docker compose logs churn-api
              exit 1
          }
          Write-Host "Deployment successful"
          Write-Host "App: http://localhost:8000"
          Write-Host "Grafana: http://localhost:3000"
          Write-Host "Prometheus: http://localhost:9090"
