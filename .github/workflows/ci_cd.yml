name: ML System Local Self-Hosted CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install ruff bandit

      - name: Run Ruff (Lint & Format)
        run: ruff check src/

      - name: Run Bandit (Security)
        run: bandit -r src/ -x tests/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  test:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/test_api_pytest.py -v

  deploy:
    name: Deploy Local Stack
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'

    steps:
      - name: Prepare git safe directory (self-hosted Windows)
        shell: powershell
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $workspaceForward = $workspace -replace '\\', '/'
          git config --global --add safe.directory "$workspace"
          git config --global --add safe.directory "$workspaceForward"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker daemon
        shell: powershell
        run: |
          docker version
          docker info

      - name: Setup Environment Variables
        shell: powershell
        run: |
          if (-not (Test-Path .env)) {
            Copy-Item .env.example .env
          }

      - name: Validate docker compose configuration
        shell: powershell
        run: docker compose config

      - name: Remove conflicting fixed-name containers
        shell: powershell
        run: |
          $containerNames = @(
            "churn_frontend",
            "nginx_gateway",
            "churn_api_service",
            "mlflow_service",
            "prometheus_service",
            "grafana_service",
            "churn_db",
            "churn_pgadmin",
            "loki_service",
            "promtail_service",
            "churn_redis",
            "churn_worker"
          )
          foreach ($name in $containerNames) {
            docker rm -f $name 2>$null | Out-Null
          }

      - name: Start MLflow for training
        shell: powershell
        run: docker compose up -d --build mlflow

      - name: Training model (pre-deploy)
        shell: powershell
        run: |
          docker compose run --rm churn-api python src/preprocessing.py
          docker compose run --rm churn-api python src/train.py

      - name: Deploy full stack with Docker Compose
        shell: powershell
        run: docker compose up -d --build --remove-orphans

      - name: Check deployment status
        shell: powershell
        run: |
          Start-Sleep -Seconds 20
          docker compose ps
          $api_status = docker ps --filter "name=churn_api_service" --filter "status=running" -q
          if (-not $api_status) {
              Write-Host "DEPLOY FAILED: churn_api_service is not running"
              docker compose logs churn-api
              exit 1
          }
          Write-Host "Deployment successful"
          Write-Host "App: http://localhost:8080"
          Write-Host "Grafana: http://localhost:3101"
          Write-Host "Prometheus: http://localhost:9090"
