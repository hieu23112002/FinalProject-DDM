name: ML System Local Self-Hosted CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # GIAI ĐOẠN 1: KIỂM THỬ (TEST)
  test:
    name: Kiểm thử hệ thống
    runs-on: self-hosted
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt thư viện và Mock Data
        continue-on-error: true
        shell: powershell
        run: |
          # Đồng bộ phiên bản scikit-learn để tránh lỗi InconsistentVersionWarning
          python -m pip install --upgrade pip
          pip install pytest httpx scikit-learn==1.0.0 joblib shap --user
          
          if (!(Test-Path "models")) { New-Item -ItemType Directory -Path "models" }
          
          # Sinh lại Mock Data bằng phiên bản thư viện hiện tại
          py -c "import joblib, sklearn.ensemble, shap, sklearn.preprocessing; model = sklearn.ensemble.RandomForestClassifier().fit([[0]*21], [0]); joblib.dump(model, 'models/best_model.pkl'); explainer = shap.TreeExplainer(model); joblib.dump(explainer, 'models/shap_explainer.pkl'); joblib.dump(['feature_'+str(i) for i in range(21)], 'models/feature_names.pkl'); joblib.dump({'gender': sklearn.preprocessing.LabelEncoder().fit(['a', 'b'])}, 'models/label_encoders.pkl');"

      - name: Chạy Pytest
        continue-on-error: true
        shell: powershell
        run: py -m pytest tests/test_api_pytest.py -v

  # GIAI ĐOẠN 2: BUILD & DEPLOY TOÀN BỘ STACK
  deploy:
    name: Đóng gói và Triển khai Local
    runs-on: self-hosted
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Deploy toàn bộ Stack bằng Docker Compose
        shell: powershell
        run: |
          # --remove-orphans giúp dọn dẹp các container rác cũ
          docker compose up -d --build --remove-orphans

      - name: Kiểm tra trạng thái hệ thống
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          Write-Host "--- Danh sách các container đang chạy ---"
          docker compose ps
          
          # Kiểm tra container API chính
          $api_status = docker ps --filter "name=churn_api_service" --filter "status=running" -q
          if ($api_status) {
              Write-Host "------------------------------------------------"
              Write-Host "DEPLOY SUCCESSFUL!"
              Write-Host "App: http://localhost:8000"
              Write-Host "Grafana: http://localhost:3000"
              Write-Host "Prometheus: http://localhost:9090"
              Write-Host "------------------------------------------------"
          } else {
              Write-Host "DEPLOY FAILED: churn_api_service is not running!"
              exit 1
          }