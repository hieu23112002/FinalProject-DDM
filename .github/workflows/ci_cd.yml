name: ML System Local Self-Hosted CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Kiểm thử hệ thống
    runs-on: self-hosted
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt thư viện và Mock Data
        continue-on-error: true
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx scikit-learn joblib shap --user
          if (!(Test-Path "models")) { New-Item -ItemType Directory -Path "models" }
          python -c "import joblib, sklearn.ensemble, shap, sklearn.preprocessing; model = sklearn.ensemble.RandomForestClassifier().fit([[0]*21], [0]); joblib.dump(model, 'models/best_model.pkl'); explainer = shap.TreeExplainer(model); joblib.dump(explainer, 'models/shap_explainer.pkl'); joblib.dump(['feature_'+str(i) for i in range(21)], 'models/feature_names.pkl'); joblib.dump({'gender': sklearn.preprocessing.LabelEncoder().fit(['a', 'b'])}, 'models/label_encoders.pkl');"

      - name: Chạy Pytest
        continue-on-error: true
        shell: powershell
        run: python -m pytest tests/test_api_pytest.py -v

  deploy:
    name: Đóng gói và Triển khai Local (Compose)
    runs-on: self-hosted
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Deploy bằng Docker Compose
        shell: powershell
        run: |
          Write-Host "Rebuilding churn-api service and updating stack..."
          # Chỉ build và restart duy nhất service churn-api để không làm gián đoạn Prometheus/Grafana
          docker compose up -d --build churn-api

      - name: Kiểm tra trạng thái
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          # Kiểm tra xem service có đang Up không
          $status = docker ps --filter "name=churn_api_service" --filter "status=running" -q
          if ($status) {
              Write-Host "------------------------------------------------"
              Write-Host "DEPLOY SUCCESSFUL!"
              Write-Host "App is running and Monitoring can see it."
              Write-Host "------------------------------------------------"
          } else {
              Write-Host "Deployment failed!"
              exit 1
          }